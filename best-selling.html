<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SASOM Best Selling</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#1b1b1b;--bg2:#242424;--bg3:#2d2d2d;--border:#333;--text:#f9f9f9;--muted:#999;--dim:#555;--accent:#c9ff00;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;background:rgba(27,27,27,.94);backdrop-filter:blur(12px);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar img{height:18px;filter:invert(1);opacity:.9;}
.topbar-divider{width:1px;height:16px;background:var(--border);}
.topbar-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;}
.sync-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--bg);background:var(--accent);border:none;border-radius:20px;padding:6px 14px;cursor:pointer;transition:opacity .15s;letter-spacing:.02em;}
.sync-btn:hover{opacity:.85;}
.sync-btn:disabled{opacity:.5;cursor:default;}
.sync-btn svg{width:13px;height:13px;flex-shrink:0;}
.sync-btn.syncing svg{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sync-status{font-size:11px;color:var(--muted);margin-left:4px;}
.cat-nav{display:flex;gap:2px;overflow-x:auto;padding:10px 24px;border-bottom:1px solid var(--border);scrollbar-width:none;}
.cat-nav::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;font-size:13px;font-weight:600;color:var(--muted);padding:6px 16px;border-radius:20px;cursor:pointer;border:none;background:transparent;transition:all .15s;white-space:nowrap;}
.cat-btn:hover{color:var(--text);}
.cat-btn.active{background:var(--accent);color:var(--bg);}
.cat-btn.disabled{opacity:.3;cursor:default;pointer-events:none;}
.main{max-width:1200px;margin:0 auto;padding:20px 24px 60px;}
.sub-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.seg{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;}
.seg-btn{font-size:12px;font-weight:600;color:var(--muted);padding:5px 14px;border-radius:8px;cursor:pointer;border:none;background:transparent;transition:all .15s;white-space:nowrap;}
.seg-btn:hover{color:var(--text);}
.seg-btn.active{background:var(--bg3);color:var(--text);}
.seg-sep{width:1px;height:20px;background:var(--border);align-self:center;margin:0 4px;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.pill-wrap{position:relative;}
.pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text);padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;white-space:nowrap;transition:border-color .15s;user-select:none;}
.pill:hover{border-color:#555;}
.pill.open{border-color:var(--accent);color:var(--accent);}
.pill-label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;}
.pill-val{font-size:12px;font-weight:700;}
.pill-caret{font-size:9px;color:var(--dim);transition:transform .2s;}
.pill.open .pill-caret{transform:rotate(180deg);}
.dropdown{position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:6px;min-width:150px;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;pointer-events:none;transform:translateY(-4px) scale(.98);transition:all .18s cubic-bezier(.4,0,.2,1);z-index:300;}
.dropdown.show{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
.dd-item{font-size:13px;font-weight:500;color:var(--muted);padding:8px 12px;border-radius:9px;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.dd-item:hover{background:var(--bg3);color:var(--text);}
.dd-item.active{color:var(--accent);}
.dd-item.no-data{opacity:.35;cursor:default;}
.dd-item.no-data:hover{background:transparent;color:var(--muted);}
.backdrop{position:fixed;inset:0;z-index:250;display:none;}
.backdrop.show{display:block;}
.status{font-size:11px;color:var(--dim);margin-bottom:16px;letter-spacing:.03em;}
.status span{color:var(--accent);}
.no-data,.coming-soon{display:none;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--dim);font-size:14px;gap:10px;text-align:center;}
.no-data .ico,.coming-soon .ico{font-size:32px;opacity:.4;}
.no-data p,.coming-soon p{opacity:.5;}
.hero{background:var(--bg2);border:1px solid var(--accent);border-radius:14px;overflow:hidden;display:flex;cursor:pointer;margin-bottom:10px;min-height:180px;transition:border-color .2s,transform .15s;-webkit-touch-callout:none;-webkit-user-select:none;}
.hero:hover{transform:translateY(-2px);border-color:#d8ff33;}
.hero-img{position:relative;flex:0 0 42%;background:#f2f2f2;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hero-img img{width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply;transition:transform .3s;user-select:none;-webkit-user-select:none;}
.hero:hover .hero-img img{transform:scale(1.04);}
.hero-badge{position:absolute;top:12px;left:12px;z-index:2;background:var(--accent);color:var(--bg);font-size:16px;font-weight:900;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.hero-body{flex:1;padding:20px 22px;display:flex;flex-direction:column;justify-content:center;gap:6px;}
.hero-label{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;}
.hero-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.4;letter-spacing:.01em;text-transform:uppercase;}
.hero-sku{font-size:10px;font-weight:500;color:var(--dim);letter-spacing:.05em;margin-top:2px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:8px;}.main{padding:12px;}.topbar{padding:0 14px;}.hero{flex-direction:column;min-height:auto;}.hero-img{flex:none;height:180px;width:100%;}.hero-body{padding:14px 16px;}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,transform .2s;cursor:pointer;-webkit-touch-callout:none;-webkit-user-select:none;}
.card:hover{border-color:#444;transform:translateY(-2px);}
.card.r2{border-color:#3a3a3a;}
.card.r3{border-color:#303030;}
.img-wrap{position:relative;background:#f2f2f2;aspect-ratio:4/3;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.img-wrap img{width:100%;height:100%;object-fit:contain;mix-blend-mode:multiply;transition:transform .3s;user-select:none;-webkit-user-select:none;draggable:false;}
.card:hover .img-wrap img{transform:scale(1.04);}
.badge{position:absolute;top:9px;left:9px;z-index:2;width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.r2 .badge{background:#e0e0e0;color:#111;}
.r3 .badge{background:#8a6030;color:#fff;}
.card:not(.r2):not(.r3) .badge{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.card-body{padding:11px 13px 13px;display:flex;flex-direction:column;gap:3px;}
.card-name{font-size:10.5px;font-weight:700;color:var(--text);line-height:1.45;letter-spacing:.02em;text-transform:uppercase;}
.card-sku{font-size:9.5px;font-weight:500;color:var(--dim);letter-spacing:.04em;}
.img-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s;}
.img-modal.show{opacity:1;pointer-events:all;}
.img-modal-inner{position:relative;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;align-items:center;gap:12px;}
.img-modal img{max-width:88vw;max-height:68vh;object-fit:contain;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.7);}
.img-modal-meta{text-align:center;padding:0 8px;}
.img-modal-name{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;line-height:1.4;}
.img-modal-sku{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.04em;}
.modal-actions{display:flex;gap:8px;margin-top:4px;}
.modal-btn{font-size:12px;font-weight:700;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;text-decoration:none;display:flex;align-items:center;transition:opacity .15s;}
.modal-btn:hover{opacity:.85;}
.modal-btn.primary{background:var(--accent);color:var(--bg);}
.modal-btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.modal-close{position:absolute;top:-12px;right:-12px;width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.card-aov{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.04em;margin-top:2px;}
.hero-aov{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.04em;margin-top:4px;}
.sizes-btn{background:var(--accent);color:var(--bg);border:none;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.04em;padding:5px 14px;cursor:pointer;white-space:nowrap;transition:opacity .15s;-webkit-touch-callout:none;display:inline-block;}
.sizes-btn:hover{opacity:.85;}
.card-footer{display:flex;align-items:flex-end;justify-content:space-between;margin-top:6px;gap:8px;}
.size-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s;}
@media(min-width:600px){.size-modal{align-items:center;justify-content:center;}}
.size-modal.show{opacity:1;pointer-events:all;}
.size-sheet{background:var(--bg2);border-radius:18px 18px 0 0;padding:20px 16px 36px;width:100%;max-height:82vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
@media(min-width:600px){.size-sheet{border-radius:18px;width:420px;max-height:72vh;transform:scale(.95);}}
.size-modal.show .size-sheet{transform:translateY(0);}
@media(min-width:600px){.size-modal.show .size-sheet{transform:scale(1);}}
.size-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.size-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;}
.size-product-name{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;line-height:1.4;flex:1;}
.size-product-sku{font-size:10px;color:var(--dim);margin-bottom:14px;}
.size-close-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.size-list{display:flex;flex-direction:column;gap:6px;}
.size-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:10px;padding:11px 14px;cursor:pointer;text-decoration:none;transition:background .12s;border:1px solid transparent;}
.size-item:hover,.size-item:active{background:#363636;border-color:var(--border);}
.size-label{font-size:15px;font-weight:900;color:var(--text);flex:1;}
.size-aov-val{font-size:12px;font-weight:700;color:var(--accent);margin-right:8px;}
.size-open{font-size:12px;color:var(--dim);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:12px;font-weight:600;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.5);transition:transform .3s,opacity .3s;opacity:0;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:var(--accent);color:var(--accent);}
.toast.error{border-color:#ff5555;color:#ff5555;}
.dd-search{width:100%;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none;font-family:inherit;margin-bottom:4px;}
.dd-search::placeholder{color:var(--dim);}
.dd-scroll{max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;margin-bottom:16px;}
.search-wrap svg{width:14px;height:14px;color:var(--dim);flex-shrink:0;}
.search-wrap input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;}
.search-wrap input::placeholder{color:var(--dim);}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <img src="https://d2cva83hdk3bwc.cloudfront.net/SASOM_LOGO_BLACK.png" alt="SASOM">
    <div class="topbar-divider"></div>
    <div class="topbar-title">Best Selling</div>
    <div class="sync-status" id="sync-status"></div>
  </div>
  <button class="sync-btn" id="sync-btn" onclick="syncFromSheet()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Sync
  </button>
</div>

<div class="cat-nav">
  <button class="cat-btn active" data-cat="tcg">TCG</button>
  <button class="cat-btn" data-cat="collectibles">Collectibles</button>
  <button class="cat-btn" data-cat="street">Street</button>
  <button class="cat-btn" data-cat="sport">Sport</button>
  <button class="cat-btn" data-cat="lux">Luxe</button>
</div>

<div class="main">
  <div class="sub-row" id="sub-row">
    <div class="seg" id="seg-subcat"></div>
  </div>
  <div class="filter-row" id="filter-row">
    <div class="pill-wrap">
      <div class="pill" id="pill-year" onclick="toggleDd('year')">
        <span class="pill-label">Year</span>
        <span class="pill-val" id="pv-year">2026</span>
        <span class="pill-caret">▾</span>
      </div>
      <div class="dropdown" id="dd-year">
        <div class="dd-item active" data-dd="year" data-val="2026">2026</div>
      </div>
    </div>
    <div class="pill-wrap">
      <div class="pill" id="pill-month" onclick="toggleDd('month')">
        <span class="pill-label">Month</span>
        <span class="pill-val" id="pv-month">Jan</span>
        <span class="pill-caret">▾</span>
      </div>
      <div class="dropdown" id="dd-month">
        <div class="dd-item active" data-dd="month" data-val="jan">January</div>
        <div class="dd-item no-data" data-dd="month" data-val="feb">February</div>
        <div class="dd-item no-data" data-dd="month" data-val="mar">March</div>
        <div class="dd-item no-data" data-dd="month" data-val="apr">April</div>
        <div class="dd-item no-data" data-dd="month" data-val="may">May</div>
        <div class="dd-item no-data" data-dd="month" data-val="jun">June</div>
        <div class="dd-item no-data" data-dd="month" data-val="jul">July</div>
        <div class="dd-item no-data" data-dd="month" data-val="aug">August</div>
        <div class="dd-item no-data" data-dd="month" data-val="sep">September</div>
        <div class="dd-item no-data" data-dd="month" data-val="oct">October</div>
        <div class="dd-item no-data" data-dd="month" data-val="nov">November</div>
        <div class="dd-item no-data" data-dd="month" data-val="dec">December</div>
      </div>
    </div>
    <div class="pill-wrap" id="brand-pill-wrap" style="display:none">
      <div class="pill" id="pill-brand" onclick="toggleDd('brand')">
        <span class="pill-label">Brand</span>
        <span class="pill-val" id="pv-brand">All</span>
        <span class="pill-caret">▾</span>
      </div>
      <div class="dropdown" id="dd-brand" style="min-width:220px">
        <input class="dd-search" id="dd-brand-search" placeholder="Search brand…" oninput="filterBrandDd(this.value)" onclick="event.stopPropagation()">
        <div class="dd-scroll" id="dd-brand-list"></div>
      </div>
    </div>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Search by name or SKU…" oninput="render()">
  </div>
  <div class="status" id="status"></div>
  <div class="no-data" id="no-data"><div class="ico">📭</div><p>No data available for this selection.</p></div>
  <div class="coming-soon" id="coming-soon" style="display:none"><div class="ico">🚧</div><p>Coming soon</p></div>
  <div class="grid" id="grid"></div>
</div>

<div class="backdrop" id="backdrop" onclick="closeAll()"></div>
<div class="img-modal" id="img-modal" onclick="if(event.target===this)closeModal()">
  <div class="img-modal-inner">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <img id="modal-img" src="" alt="">
    <div class="img-modal-meta">
      <div class="img-modal-name" id="modal-name"></div>
      <div class="img-modal-sku" id="modal-sku"></div>
    </div>
    <div class="modal-actions">
      <a id="modal-link" href="#" target="_blank" class="modal-btn primary">View on SASOM</a>
      <button class="modal-btn secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="size-modal" id="size-modal" onclick="if(event.target===this)closeSizeModal()">
  <div class="size-sheet">
    <div class="size-handle"></div>
    <div class="size-header">
      <div>
        <div class="size-product-name" id="size-modal-name"></div>
        <div class="size-product-sku" id="size-modal-sku"></div>
      </div>
      <button class="size-close-btn" onclick="closeSizeModal()">✕</button>
    </div>
    <div class="size-list" id="size-modal-list"></div>
  </div>
</div>

<script>
// ─── SHEET CONFIG ─────────────────────────────────────────────
const SHEET_ID = '1kpagr-hp4K_YnK6PEBtTL3AfVflCEpF-1pt4c_5QD5s';
// ★ After deploying sync-script.gs as a Web App, paste the URL below:
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfUZxEAWMbjD1CV_VKHQhko9WKLKx87XJ4nuzGa2y64KRCL_txYIRfER-L3Nn4_zqZZw/exec';  // ← paste here, e.g. 'https://script.google.com/macros/s/AKf.../exec'
const SHEET_CSV_URLS = [
  ...(APPS_SCRIPT_URL ? [APPS_SCRIPT_URL] : []),
  'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/pub?output=csv&gid=0'
];

// ─── LABELS ──────────────────────────────────────────────────
const BRAND_LABELS  = {pokemon:'Pokémon', onepiece:'One Piece'};
const SUBCAT_LABELS = {boxpack:'Box / Pack', single:'Single Card', shoes:'Shoes', apparel:'Apparel', bags:'Bags', accessories:'Accessories'};
const SUBCAT_LABELS_CAT = {
  collectibles:{boxpack:'Whole Set / Single Box', card:'Check Card'}
};
function brandDisplay(b){ return BRAND_LABELS[b] || b; }

let DATA = JSON.parse(JSON.stringify(SEED));

// ─── DYNAMIC FILTER HELPERS ──────────────────────────────────
// Subcats: aggregate across ALL brands so tabs always appear if any data exists for month
function getAllSubcatsForMonth(cat,year,month){
  const yd=DATA[cat]?.[year]; if(!yd) return [];
  const set=new Set();
  Object.values(yd).forEach(bd=>{
    if(!bd||typeof bd!=='object') return;
    Object.keys(bd).filter(s=>s!=='all'&&bd[s]?.[month]?.full?.length>0).forEach(s=>set.add(s));
  });
  return [...set];
}
// Brands: only brands that have data for the current subcat+month
function getBrandsForSubcat(cat,year,subcat,month){
  const yd=DATA[cat]?.[year]; if(!yd) return [];
  return Object.keys(yd).filter(b=>{
    if(b==='all') return false;
    if(!subcat||subcat==='all') return Object.values(yd[b]).some(sd=>sd[month]?.full?.length>0);
    return yd[b]?.[subcat]?.[month]?.full?.length>0;
  });
}
function hasAnyDataForMonth(cat,year,month){
  const yd=DATA[cat]?.[year]; if(!yd) return false;
  return Object.values(yd).some(bd=>Object.values(bd).some(sd=>sd[month]?.full?.length>0));
}

// ─── FILTER SYSTEM ───────────────────────────────────────────
function renderBrandList(brands,query){
  const q=(query||'').toLowerCase();
  const list=q?brands.filter(b=>b.toLowerCase().includes(q)):brands;
  const el=document.getElementById('dd-brand-list');
  el.innerHTML=list.map(b=>'<div class="dd-item'+(b===S.brand?' active':'')+'" data-brand="'+b.replace(/"/g,'&quot;')+'">'+brandDisplay(b)+'</div>').join('')||'<div class="dd-item no-data" style="pointer-events:none">No results</div>';
  el.querySelectorAll('.dd-item[data-brand]').forEach(item=>{
    item.addEventListener('click',()=>{
      el.querySelectorAll('.dd-item').forEach(x=>x.classList.remove('active'));
      item.classList.add('active');
      S.brand=item.dataset.brand;
      document.getElementById('pv-brand').textContent=brandDisplay(S.brand);
      closeAll(); render();
    });
  });
}
function filterBrandDd(q){
  renderBrandList(getBrandsForSubcat(S.cat,S.year,S.subcat,S.month),q);
}
function updateBrandFilter(){
  const avail=getBrandsForSubcat(S.cat,S.year,S.subcat,S.month);
  const multi=avail.length>0;
  if(!avail.includes(S.brand)) S.brand=avail[0]||'all';
  const wrap=document.getElementById('brand-pill-wrap');
  if(!wrap) return;
  wrap.style.display=multi?'':'none';
  if(multi){
    document.getElementById('pv-brand').textContent=brandDisplay(S.brand);
    renderBrandList(avail,document.getElementById('dd-brand-search')?.value||'');
  }
}

  subRow.style.display=multiSub?'flex':'none';
  if(multiSub){
    seg.innerHTML=availSub.map(s=>'<button class="seg-btn'+(s===S.subcat?' active':'')+'" data-val="'+s+'">'+subcatDisplay(s,cat)+'</button>').join('');
    seg.querySelectorAll('.seg-btn').forEach(b=>{
      b.addEventListener('click',()=>{
        seg.querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active'); S.subcat=b.dataset.val;
        updateBrandFilter(); render();
      });
    });
  }
  // Step 2: Brands for current subcat
  updateBrandFilter();
  updateCatButtons();
}

// ─── CATEGORY BUTTONS ────────────────────────────────────────
function updateCatButtons(){
  document.querySelectorAll('.cat-btn').forEach(btn=>{
    const c=btn.dataset.cat;
    if(c===S.cat){btn.classList.remove('disabled');return;}
    btn.classList.toggle('disabled',!(DATA[c]&&Object.keys(DATA[c]).length>0));
  });
}
document.querySelectorAll('.cat-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    if(b.classList.contains('disabled'))return;
    document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); S.cat=b.dataset.cat;

});

// ─── SHOW AOV for street & sport ─────────────────────────────
function showAOV(){ return S.cat==='street'||S.cat==='sport'; }

// ─── RENDER ──────────────────────────────────────────────────
function render(){
  const grid=document.getElementById('grid'), noData=document.getElementById('no-data');
  const comingSoon=document.getElementById('coming-soon'), status=document.getElementById('status');
  document.querySelectorAll('.hero').forEach(h=>h.remove());
  comingSoon.style.display='none';
  const searchQ=(document.getElementById('search-input')?.value||'').toLowerCase().trim();
  let products=DATA[S.cat]?.[S.year]?.[S.brand]?.[S.subcat]?.[S.month]?.full;
  if(products&&searchQ) products=products.filter(p=>(p.name||'').toLowerCase().includes(searchQ)||(p.sku||'').toLowerCase().includes(searchQ));
  if(!products||!products.length){
    grid.innerHTML=''; grid.style.display='none'; noData.style.display='flex'; status.innerHTML=''; return;
  }
  noData.style.display='none'; grid.style.display='grid';
  status.innerHTML='<span>'+products.length+' products</span> · '+MONTH_FULL[S.month]+' '+S.year;
  const hero=products[0], rest=products.slice(1);
  const heroEl=document.createElement('div');
  heroEl.className='hero';
  heroEl.dataset.sku=hero.sku; heroEl.dataset.img=hero.img; heroEl.dataset.name=hero.name;
  if(hero.sizes) heroEl.dataset.sizes=JSON.stringify(hero.sizes);
  heroEl.innerHTML=
    '<div class="hero-img"><img src="'+hero.img+'" alt="'+hero.name+'" loading="lazy" draggable="false"><div class="hero-badge">1</div></div>'+
    '<div class="hero-body">'+
      '<div class="hero-label">#1 Best Selling</div>'+
      '<div class="hero-name">'+hero.name+'</div>'+
      '<div class="hero-sku">'+hero.sku+'</div>'+
      (showAOV()&&hero.aov ? '<div class="hero-aov">AOV ฿'+hero.aov.toLocaleString()+'</div>' : '')+
      (hero.sizes ? '<button class="sizes-btn" style="margin-top:10px">Sizes ›</button>' : '')+
    '</div>';

  const rc=r=>r===2?'r2':r===3?'r3':'';
  grid.innerHTML=rest.map(p=>
    '<div class="card '+rc(p.rank)+'" data-sku="'+p.sku+'" data-img="'+p.img+'" data-name="'+p.name.replace(/"/g,'&quot;')+'"'+(p.sizes?' data-sizes=\''+JSON.stringify(p.sizes)+'\''  :'')+'>'+
      '<div class="img-wrap">'+
        '<img src="'+p.img+'" alt="'+p.name+'" loading="lazy" draggable="false">'+
        '<div class="badge">'+p.rank+'</div>'+
      '</div>'+
      '<div class="card-body">'+
        '<div class="card-name">'+p.name+'</div>'+
        '<div class="card-sku">'+p.sku+'</div>'+
        ((showAOV()&&p.aov)||p.sizes ? '<div class="card-footer">'+
          '<div>'+(showAOV()&&p.aov ? '<div class="card-aov">AOV ฿'+p.aov.toLocaleString()+'</div>' : '')+'</div>'+
          (p.sizes ? '<button class="sizes-btn">Sizes ›</button>' : '')+
        '</div>' : '')+
      '</div>'+
    '</div>'
  ).join('');
  grid.parentNode.insertBefore(heroEl, grid);
  attachCardEvents();
  updateMonthDropdown();
}

// ─── SASOM URL ───────────────────────────────────────────────
function slugify(s){return s.toLowerCase().replace(/['"]/g,'').replace(/[()[\]&]/g,'').replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-');}
function sasomUrl(sku,name){return 'https://sasom.co.th/en/collectibles/'+sku+'/'+slugify(sku)+'-'+slugify(name)+'?ref='+Date.now();}
function navigateTo(url){
  const a=document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener noreferrer'; a.style.display='none';
  document.body.appendChild(a); a.click(); setTimeout(()=>a.remove(),500);
}

// ─── CARD EVENTS ─────────────────────────────────────────────
const isTouch=()=>('ontouchstart' in window)||(navigator.maxTouchPoints>0);
function attachCardEvents(){
  document.querySelectorAll('.card[data-sku],.hero[data-sku]').forEach(card=>{
    const sku=card.dataset.sku, img=card.dataset.img, name=card.dataset.name;
    const sizes=card.dataset.sizes?JSON.parse(card.dataset.sizes):null;
    function goSASOM(){
      if(isTouch()) window.open('https://sasom.co.th/en','_sasom_warm');
      window.open(sasomUrl(sku,name),'_blank');
    }
    if(isTouch()){
      let sx=0,sy=0,scrolled=false,isLong=false,pt=null;
      card.addEventListener('touchstart',e=>{
        if(e.target.classList.contains('sizes-btn'))return;
        sx=e.touches[0].clientX;sy=e.touches[0].clientY;scrolled=false;isLong=false;
        pt=setTimeout(()=>{isLong=true;openModal(sku,img,name);if(navigator.vibrate)navigator.vibrate(40);},500);
      },{passive:true});
      card.addEventListener('touchmove',e=>{
        if(Math.abs(e.touches[0].clientX-sx)>8||Math.abs(e.touches[0].clientY-sy)>8){scrolled=true;clearTimeout(pt);}
      },{passive:true});
      card.addEventListener('touchend',e=>{
        if(e.target.classList.contains('sizes-btn'))return;
        clearTimeout(pt);
        if(!scrolled&&!isLong){e.preventDefault();goSASOM();}
      },{passive:false});
    } else {
      let mt=null,mh=false;
      card.addEventListener('mousedown',e=>{if(e.target.classList.contains('sizes-btn'))return;mh=false;mt=setTimeout(()=>{mh=true;openModal(sku,img,name);},500);});
      card.addEventListener('mouseup',()=>clearTimeout(mt));
      card.addEventListener('mouseleave',()=>clearTimeout(mt));
      card.addEventListener('click',e=>{if(e.target.classList.contains('sizes-btn'))return;if(!mh)goSASOM();mh=false;});
    }
    const sizeBtn=card.querySelector('.sizes-btn');
    if(sizeBtn&&sizes&&sizes.length>0){
      sizeBtn.addEventListener('click',e=>{e.stopPropagation();openSizeModal(sku,name,sizes);});
      sizeBtn.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();openSizeModal(sku,name,sizes);},{passive:false});
    }
    card.querySelector('img').addEventListener('contextmenu',e=>e.preventDefault());
    card.addEventListener('contextmenu',e=>e.preventDefault());
  });
}

// ─── FETCH HELPER ────────────────────────────────────────────
async function tryFetch(urls){
  for(const url of urls){
    try{
      const r=await fetch(url,{cache:'no-store',redirect:'follow'});
      if(r.ok){const t=await r.text();if(t.length>100)return t;}
    }catch(e){console.warn('fetch failed:',url,e.message);}
  }
  return null;
}

// ─── SYNC ────────────────────────────────────────────────────
async function doSync(btn,statusEl){
  if(!APPS_SCRIPT_URL){
    showToast('⚠ ตั้งค่า APPS_SCRIPT_URL ใน HTML ก่อน Sync','error');
    return false;
  }
  btn.disabled=true;btn.classList.add('syncing');statusEl.textContent='Syncing…';
  try{
    const csv=await tryFetch(SHEET_CSV_URLS);
    if(!csv) throw new Error('fetch failed — ตรวจ Apps Script URL หรือ network');
    if(csv.startsWith('error:')) throw new Error('Apps Script error: '+csv.slice(6,80));
    const parsed=parseSheetCSV(csv);
    if(!parsed||Object.keys(parsed).length===0) throw new Error('parse empty — CSV ได้แต่ parse ไม่ได้');
    DATA=parsed;buildFilters();render();
    statusEl.textContent='Synced';return true;
  }catch(err){console.error('Sync:',err);statusEl.textContent='';showToast('⚠ '+err.message,'error');return false;}
  finally{btn.disabled=false;btn.classList.remove('syncing');}
}
async function autoSync(){await doSync(document.getElementById('sync-btn'),document.getElementById('sync-status'));}
async function syncFromSheet(){
  const ok=await doSync(document.getElementById('sync-btn'),document.getElementById('sync-status'));
  if(ok) showToast('✓ Synced','success');
}

// ─── CSV PARSER (V2 multi-sheet format) ──────────────────────
function parseSheetCSV(csv){
  const lines=csv.trim().split('\n');
  if(lines.length<2)return null;
  function parseRow(line){
    const result=[],re=/("([^"]*(?:""[^"]*)*)"|[^,]*),?/g;let m;
    while((m=re.exec(line))!==null){
      if(m.index===re.lastIndex){re.lastIndex++;break;}
      result.push(m[2]!==undefined?m[2].replace(/""/g,'"'):m[1]||'');
    }
    return result;
  }
  const headers=parseRow(lines[0]);
  const idxOf=h=>headers.findIndex(x=>x.trim().toLowerCase()===h.toLowerCase());

  // Detect format
  const iTs=idxOf('Sold_timestamp'),iGrp=idxOf('Group'),iCat=idxOf('Category');
  const iBrand=idxOf('Brand'),iSub=idxOf('Subcategory'),iName=idxOf('Product Name');
  const iSku=idxOf('SKU'),iImg=idxOf('IMG'),iSize=idxOf('Size');
  // Support both new output header ("Sold GMV") and legacy ("SUM of Sold GMV")
  const iGmv=idxOf('Sold GMV')>=0?idxOf('Sold GMV'):idxOf('SUM of Sold GMV');
  const iOrders=idxOf('Sold Orders')>=0?idxOf('Sold Orders'):idxOf('SUM of Sold Orders');

  // Legacy V1 format detection
  const iCatOld=idxOf('Category'),iBrandOld=idxOf('Brand'),iSubOld=idxOf('Sub Category');
  const iMonthOld=idxOf('Month'),iYearOld=idxOf('Year'),iSkuOld=idxOf('SKU');
  const iNameOld=idxOf('Product Name'),iImgOld=idxOf('IMG URL');
  const iOrdersOld=idxOf('Sold Orders'),iGmvOld=idxOf('Sold GMV'),iAovOld=idxOf('AOV'),iSizeOld=idxOf('Size');

  // Use V2 format if Sold_timestamp and Group present
  const isV2 = iTs>=0 && iGrp>=0;

  function nCatV2(grp,cat){
    const g=(grp||'').toLowerCase(),c=(cat||'').toLowerCase();
    if(g==='art') return c.includes('tcg')?'tcg':'collectibles';
    if(g==='street') return 'street';
    if(g==='sport') return 'sport';
    if(g==='lux') return 'lux';
    return c||'unknown';
  }
  function nSubcatV2(sub,cat,grp){
    const s=(sub||'').trim(),sl=s.toLowerCase(),c=(cat||'').trim().toLowerCase();
    // TCG subcategory keywords
    if(sl.includes('single')) return 'single';
    if(sl.includes('box')||sl.includes('pack')) return 'boxpack';
    // Street / Sport / Lux: use Category column
    if(c==='shoes') return 'shoes';
    if(c==='apparel') return 'apparel';
    if(c==='bags') return 'bags';
    if(c==='accessories') return 'accessories';
    // General: if value has underscores take the last part (e.g. sub_collectibles_artwork → artwork)
    if(s.includes('_')){const p=s.split('_');return p[p.length-1].toLowerCase();}
    return sl||c||'all';
  }
  function nBrandV2(brand,cat){
    const b=(brand||'').trim();
    if(!b) return 'all';
    const bl=b.toLowerCase();
    // TCG: map known brands to stable keys; others use original case
    if((cat||'').toLowerCase()==='tcg'){
      if(bl.includes('pokemon')) return 'pokemon';
      if(bl.includes('one')&&bl.includes('piece')) return 'onepiece';
    }
    // All brands: preserve original case from sheet
    return b;
  }
  function parseTs(ts){
    const p=(ts||'').trim().split(/\s+/);
    if(p.length>=2){const m=p[0].toLowerCase().slice(0,3),y=p[1];return{m,y};}
    return null;
  }

  function nCatOld(s){return(s||'').trim().toLowerCase()||'unknown';}
  function nBrandOld(s){
    if(!s||!s.trim())return 'all';s=s.trim().toLowerCase();
    if(s.includes('one')&&s.includes('piece'))return 'onepiece';
    return s.replace(/\s+/g,'');
  }
  function nSubOld(s){
    if(!s||!s.trim())return 'all';s=s.trim().toLowerCase().replace(/[\s\/]/g,'');
    if(s.includes('single'))return 'single';
    if(s.includes('box')||s.includes('pack'))return 'boxpack';
    return s;
  }

  const groups={};
  for(let i=1;i<lines.length;i++){
    const row=parseRow(lines[i]);
    if(!row||!row.length)continue;
    let catKey,brandKey,subKey,month,year,sku,name,img,orders,gmv,size='',aov=0;

    if(isV2){
      if(row.length<10)continue;
      const ts=parseTs(row[iTs]);if(!ts)continue;
      month=ts.m;year=ts.y;
      const grp=row[iGrp]||'',cat=row[iCat]||'';
      catKey=nCatV2(grp,cat);
      brandKey=nBrandV2(iBrand>=0?row[iBrand]:'',catKey);
      subKey=nSubcatV2(iSub>=0?row[iSub]:'',cat,grp);
      name=(iName>=0?row[iName]:'').trim();
      sku=(iSku>=0?row[iSku]:'').trim();
      img=(iImg>=0?row[iImg]:'').trim();
      orders=parseInt(iOrders>=0?row[iOrders]:0)||0;
      gmv=parseFloat(iGmv>=0?row[iGmv]:0)||0;
      size=(iSize>=0?row[iSize]:'').trim();
      aov=catKey==='street'||catKey==='sport'?(gmv&&orders?Math.round(gmv/orders):0):0;
    } else {
      if([iCatOld,iBrandOld,iSubOld,iMonthOld,iYearOld,iSkuOld,iNameOld,iImgOld,iOrdersOld].some(x=>x<0))continue;
      if(!row[iSkuOld]||!row[iSkuOld].trim())continue;
      catKey=nCatOld(row[iCatOld]);brandKey=nBrandOld(row[iBrandOld]);subKey=nSubOld(row[iSubOld]);
      month=(row[iMonthOld]||'').trim().toLowerCase().slice(0,3);
      year=(row[iYearOld]||'').trim();
      sku=row[iSkuOld].trim();name=row[iNameOld].trim();img=row[iImgOld].trim();
      orders=parseInt(row[iOrdersOld])||0;gmv=parseFloat(row[iGmvOld])||0;
      aov=(iAovOld>=0?parseFloat(row[iAovOld])||0:0);
      size=(iSizeOld>=0?row[iSizeOld]:'').trim();
      if(catKey==='street'&&!aov&&gmv&&orders)aov=Math.round(gmv/orders);
    }

    if(!sku||!month||!year)continue;
    // clean name
    if(name.toLowerCase().startsWith('name:'))name=name.slice(5).trim();

    const gk=catKey+'|'+year+'|'+brandKey+'|'+subKey+'|'+month;
    if(!groups[gk])groups[gk]={};
    if(!groups[gk][sku])groups[gk][sku]={sku,name,img,orders:0,gmv:0,aov_sum:0,sizes:[]};
    const g=groups[gk][sku];
    g.orders+=orders;g.gmv+=gmv;
    if(size&&orders>0)g.sizes.push({size,orders,aov:aov||Math.round(gmv/orders||0)});
  }

  const result={};
  Object.entries(groups).forEach(([gk,skuMap])=>{
    const [cat,year,brand,subcat,month]=gk.split('|');
    const hasAov=cat==='street'||cat==='sport';
    const products=Object.values(skuMap).map(g=>{
      const szAgg={};
      g.sizes.forEach(s=>{if(!szAgg[s.size])szAgg[s.size]={o:0,g:0};szAgg[s.size].o+=s.orders;szAgg[s.size].g+=s.aov*s.orders;});
      const sl=Object.entries(szAgg).sort((a,b)=>b[1].o-a[1].o).slice(0,10).map(([sz,v])=>({size:sz,orders:v.o,aov:v.o>0?Math.round(v.g/v.o):0}));
      const aov=hasAov&&g.orders>0?Math.round(g.gmv/g.orders):null;
      return {sku:g.sku,name:g.name,img:g.img,orders:g.orders,gmv:g.gmv,aov,sizes:sl.length?sl:null};
    });
    products.sort((a,b)=>b.orders!==a.orders?b.orders-a.orders:b.gmv-a.gmv);
    const top=products.slice(0,10).map((p,i)=>{
      const it={rank:i+1,sku:p.sku,name:p.name,img:p.img};
      if(p.aov)it.aov=p.aov;if(p.sizes)it.sizes=p.sizes;return it;
    });
    let r=result;
    for(const k of[cat,year,brand,subcat])r=r[k]=(r[k]||{});
    r[month]={full:top};
  });

  return deepMerge(JSON.parse(JSON.stringify(SEED)),result);
}

function deepMerge(target,source){
  Object.keys(source).forEach(k=>{
    if(source[k]&&typeof source[k]==='object'&&!Array.isArray(source[k])){
      if(!target[k])target[k]={};deepMerge(target[k],source[k]);
    } else {target[k]=source[k];}
  });
  return target;
}
